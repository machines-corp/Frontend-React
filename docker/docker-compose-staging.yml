services:
  frontend:
    build:
      context: ..                 # raíz del proyecto
      dockerfile: docker/Dockerfile
    container_name: react_app
    ports:
      - "5173:5173"
    volumes:
      - ..:/app                   # monta tu código para hot reload
      - /app/node_modules         # mantiene node_modules dentro del contenedor
    environment:
      - CHOKIDAR_USEPOLLING=true
    # sin command extra: arrancará con el CMD del Dockerfile
  nginx:
    image: nginx:alpine
    container_name: react_app_nginx
    depends_on:
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/machinescorp.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped