services:
  frontend:
    build:
      context: ..                 # raíz del proyecto (sube un nivel desde /docker)
      dockerfile: docker/Dockerfile.dev
    container_name: react_app_dev
    ports:
      - "5173:5173"
    volumes:
      - ..:/app                  # monta tu código para hot reload
      - /app/node_modules        # asegura node_modules dentro del contenedor
    environment:
      - CHOKIDAR_USEPOLLING=true