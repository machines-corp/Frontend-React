services:
  frontend:
    build:
      context: ..                 # raíz del proyecto
      dockerfile: docker/Dockerfile
    container_name: react_app
    ports:
      - "5173:5173"
    volumes:
      - ..:/app                   # monta tu código para hot reload
      - /app/node_modules         # mantiene node_modules dentro del contenedor
    environment:
      - CHOKIDAR_USEPOLLING=true
    # sin command extra: arrancará con el CMD del Dockerfile